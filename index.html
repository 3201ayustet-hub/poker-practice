<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Practice</title>
  <script src="data.js"></script>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0f172a; color:#e5e7eb; }
    header { padding:18px; background:#111827; position:sticky; top:0; z-index:2; border-bottom:1px solid #334155; }
    h1 { margin:0; font-size:24px; }
    .wrap { padding:16px; max-width:1000px; margin:auto; }
    .panel { background:#111827; border:1px solid #334155; border-radius:16px; padding:14px; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    label { display:block; font-size:13px; color:#94a3b8; margin-bottom:5px; }
    select, button, input, textarea { width:100%; box-sizing:border-box; border-radius:12px; border:1px solid #475569; background:#020617; color:#e5e7eb; padding:12px; font-size:16px; }
    button { background:#2563eb; border:none; font-weight:700; margin-top:10px; }
    .clear { background:#475569; }
    .cards { display:grid; grid-template-columns:1fr; gap:16px; }
    .card { background:#111827; border:1px solid #334155; border-radius:16px; overflow:hidden; }
    .card img { width:100%; display:block; background:#020617; }
    .card-body { padding:12px; }
    .meta { color:#94a3b8; font-size:13px; line-height:1.7; }
    a { color:#93c5fd; }
    @media (min-width:700px){ .grid{grid-template-columns:repeat(4,1fr);} .cards{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
<header>
  <h1>Poker Practice</h1>
  <div style="margin-top:6px;"><a href="admin.html">開発者画面</a></div>
</header>

<div class="wrap">
  <div class="panel">
    <div class="grid">
      <div><label>参加人数</label><select id="players"></select></div>
      <div><label>スタック</label><select id="stack"></select></div>
      <div><label>ポジション</label><select id="position"></select></div>
      <div><label>アクション</label><select id="action"></select></div>
    </div>
    <button onclick="searchImages()">検索</button>
    <button class="clear" onclick="clearSearch()">条件クリア</button>
  </div>
  <div id="count" class="meta"></div>
  <div id="results" class="cards"></div>
</div>

<script>
function setOptions(id, values){
  const el=document.getElementById(id);
  el.innerHTML='<option value="">すべて</option>';
  values.forEach(v=>{ const op=document.createElement('option'); op.value=v; op.textContent=v; el.appendChild(op); });
}
function init(){
  setOptions('players', APP_DATA.options.players);
  setOptions('stack', APP_DATA.options.stacks);
  setOptions('position', APP_DATA.options.positions);
  setOptions('action', APP_DATA.options.actions);
  searchImages();
}
function searchImages(){
  const cond={
    players:document.getElementById('players').value,
    stack:document.getElementById('stack').value,
    position:document.getElementById('position').value,
    action:document.getElementById('action').value
  };
  const list=APP_DATA.images.filter(x=>(!cond.players||x.players===cond.players)&&(!cond.stack||x.stack===cond.stack)&&(!cond.position||x.position===cond.position)&&(!cond.action||x.action===cond.action));
  document.getElementById('count').textContent=`${list.length}件表示`;
  document.getElementById('results').innerHTML=list.map(x=>`
    <div class="card">
      <img src="${x.image}" alt="${x.title}">
      <div class="card-body">
        <h3>${x.title}</h3>
        <div class="meta">${x.players} / ${x.stack} / ${x.position} / ${x.action}</div>
        <p>${x.memo||''}</p>
      </div>
    </div>`).join('') || '<p>該当する画像がありません。</p>';
}
function clearSearch(){ ['players','stack','position','action'].forEach(id=>document.getElementById(id).value=''); searchImages(); }
init();
</script>
</body>
</html>
