<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Range Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">♠ ♥ ♦ ♣ SHARK TRAINER</p>
        <h1><span class="hero-mark">🦈</span> Shark Poker Lab</h1>
        <p class="subtitle">Master Your Range</p>
      </div>
      <div class="stats">
        <div>モード <strong id="modeTitle">-</strong></div>
        <div>進捗 <strong id="progress">-</strong></div>
        <div>今回スコア <strong id="score">-</strong></div>
      </div>
    </header>

    <nav class="modes">
      <button class="mode-btn ref" data-mode="home">🏛️ Lab</button>
      <button class="mode-btn ref" data-mode="beginner">🎓 はじめて</button>
      <button class="mode-btn" data-mode="preflop">🎯 トレーニング</button>
      <button class="mode-btn" data-mode="equitySense">📊 勝率感覚</button>
      <button class="mode-btn ref" data-mode="rangeLibrary">📚 レンジ</button>
      <button class="mode-btn ref" data-mode="handLookup">🔍 逆引き</button>
      <button class="mode-btn ref" data-mode="boardDictionary">🃏 ボード事典</button>
      <button class="mode-btn ref" data-mode="terms">📘 用語</button>
          <button class="mode-btn ref" data-mode="gacha">🎰 ガチャ</button>
    </nav>

    <div id="quizArea">
      <section class="card quiz-spot-card">
        <p id="phase" class="phase"></p>
        <div id="spotVisual"></div>
        <div class="info-grid">
          <div><span>スポット</span><strong id="spot"></strong></div>
          <div><span>あなた</span><strong id="hero"></strong></div>
          <div><span>ハンド</span><strong id="hand"></strong></div>
          <div><span>ボード</span><strong id="board"></strong></div>
        </div>
      </section>

      <section class="card">
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback"></div>
        <div id="explanation" class="explanation"></div>
      </section>

      <section class="actions">
        <button id="nextBtn" class="primary" disabled>次へ</button>
      </section>
    </div>

    <div id="refArea" style="display:none"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
