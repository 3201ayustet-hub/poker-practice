<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Range Trainer v4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
<header>
<div><p class="eyebrow">Poker Range Trainer v4</p><h1>問題を解く + レンジを参照する</h1></div>
<div class="stats"><div>モード <strong id="modeTitle">-</strong></div><div>進捗 <strong id="progress">-</strong></div><div>今回スコア <strong id="score">-</strong></div></div>
</header>
<nav class="modes">
<button class="mode-btn" data-mode="integrated">2ステップ実戦</button>
<button class="mode-btn" data-mode="preflop">プリフロップ</button>
<button class="mode-btn" data-mode="boardCategory">ボード分類</button>
<button class="mode-btn" data-mode="boardAdvantage">有利不利</button>
<button class="mode-btn" data-mode="mistakes">間違い復習</button>
<button class="mode-btn ref" data-mode="refStrategy">戦略表</button>
<button class="mode-btn ref" data-mode="refSB">SB戦略</button>
<button class="mode-btn ref" data-mode="refOpen">オープンレンジ</button>
<button class="mode-btn ref" data-mode="terms">用語集</button>
</nav>

<div id="quizArea">
<section class="card">
<p id="phase" class="phase"></p>
<div class="info-grid">
<div><span>スポット</span><strong id="spot"></strong></div>
<div><span>あなた</span><strong id="hero"></strong></div>
<div><span>ハンド</span><strong id="hand"></strong></div>
<div><span>ボード</span><strong id="board"></strong></div>
</div>
</section>
<section class="card">
<div id="choices" class="choices"></div>
<div id="feedback" class="feedback"></div>
<div id="explanation" class="explanation"></div>
</section>
<section class="actions">
<button id="nextBtn" class="primary" disabled>次へ</button>
<button id="shuffleBtn" class="secondary">ランダム出題</button>
<button id="resetBtn" class="danger">成績リセット</button>
</section>
</div>
<div id="refArea" style="display:none"></div>
</main>
<script src="app.js"></script>
</body>
</html>
