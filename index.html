<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Range Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <div>
        <p class="eyebrow">Poker Range Trainer Ver 1.0</p>
        <h1>レンジ → ボード有利不利</h1>
      </div>
      <div class="stats">
        <div>進捗 <strong id="progress"></strong></div>
        <div id="score"></div>
      </div>
    </header>

    <section class="card">
      <p id="phase" class="phase"></p>
      <div class="info-grid">
        <div>
          <span>プリフロップ</span>
          <strong id="spot"></strong>
        </div>
        <div>
          <span>あなたのハンド</span>
          <strong id="hand"></strong>
        </div>
        <div>
          <span>フロップ</span>
          <strong id="flop"></strong>
        </div>
      </div>
    </section>

    <section class="card">
      <div id="choices" class="choices"></div>
      <div id="feedback" class="feedback"></div>
      <div id="explanation" class="explanation"></div>
    </section>

    <section class="actions">
      <button id="nextBtn" class="primary" disabled>次へ</button>
      <button id="shuffleBtn" class="secondary">ランダムに並び替え</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
