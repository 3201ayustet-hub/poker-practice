<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Range Trainer v6</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Poker Range Trainer v6</p>
        <h1>レンジと思考を鍛える</h1>
        <p class="subtitle">完全ランダム出題 / Mix Open整合性修正版 / サメ先生解説</p>
      </div>
      <div class="stats">
        <div>モード <strong id="modeTitle">-</strong></div>
        <div>進捗 <strong id="progress">-</strong></div>
        <div>今回スコア <strong id="score">-</strong></div>
      </div>
    </header>

    <nav class="modes">
      <button class="mode-btn" data-mode="preflop">🃏 プリフロップ</button>
      <button class="mode-btn" data-mode="boardAdvantage">🌊 ボード有利不利</button>
      <button class="mode-btn ref" data-mode="rangeLibrary">📚 レンジライブラリ</button>
      <button class="mode-btn ref" data-mode="boardDictionary">📖 ボード辞典</button>
      <button class="mode-btn ref" data-mode="terms">📘 用語集</button>
    </nav>

    <div id="quizArea">
      <section class="card">
        <p id="phase" class="phase"></p>
        <div class="info-grid">
          <div><span>スポット</span><strong id="spot"></strong></div>
          <div><span>あなた</span><strong id="hero"></strong></div>
          <div><span>ハンド</span><strong id="hand"></strong></div>
          <div><span>ボード</span><strong id="board"></strong></div>
        </div>
      </section>

      <section class="card">
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback"></div>
        <div id="explanation" class="explanation"></div>
      </section>

      <section class="actions">
        <button id="nextBtn" class="primary" disabled>次へ</button>
        <button id="shuffleBtn" class="secondary">ランダムで最初から</button>
        <button id="resetBtn" class="ghost">今回スコアをリセット</button>
      </section>
    </div>

    <div id="refArea" style="display:none"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
