<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Practice</title>
  <script src="data.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f4f5;
      color: #111827;
    }
    header {
      background: #111827;
      color: white;
      padding: 18px;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      background: white;
    }
    button {
      cursor: pointer;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 700;
      margin-top: 12px;
    }
    .clear {
      background: #6b7280;
    }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .result-item {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .result-item img {
      width: 100%;
      display: block;
      background: #e5e7eb;
    }
    .result-info {
      padding: 12px;
    }
    .result-info h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }
    .tags {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.6;
    }
    .memo {
      margin-top: 6px;
      font-size: 13px;
      color: #374151;
    }
    .nav {
      margin-top: 8px;
      font-size: 14px;
    }
    .nav a {
      color: #93c5fd;
    }
    @media (max-width: 700px) {
      .filters {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 430px) {
      .filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<header>
  <h1>Poker Practice</h1>
  <div class="nav"><a href="admin.html">開発者ページへ</a></div>
</header>

<main>
  <section class="card">
    <div class="filters">
      <div>
        <label>参加人数</label>
        <select id="players"></select>
      </div>
      <div>
        <label>スタック</label>
        <select id="stack"></select>
      </div>
      <div>
        <label>ポジション</label>
        <select id="position"></select>
      </div>
      <div>
        <label>アクション</label>
        <select id="action"></select>
      </div>
    </div>
    <button onclick="searchImages()">検索</button>
    <button class="clear" onclick="resetSearch()">条件をリセット</button>
  </section>

  <section id="count" class="card"></section>
  <section id="results" class="result-grid"></section>
</main>

<script>
function setupSelect(id, values) {
  const select = document.getElementById(id);
  select.innerHTML = '<option value="">すべて</option>';
  values.forEach(value => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });
}

function setup() {
  setupSelect("players", OPTIONS.players);
  setupSelect("stack", OPTIONS.stack);
  setupSelect("position", OPTIONS.position);
  setupSelect("action", OPTIONS.action);
  searchImages();
}

function getValue(id) {
  return document.getElementById(id).value;
}

function searchImages() {
  const players = getValue("players");
  const stack = getValue("stack");
  const position = getValue("position");
  const action = getValue("action");

  const results = IMAGE_DATA.filter(item => {
    return (!players || item.players === players)
      && (!stack || item.stack === stack)
      && (!position || item.position === position)
      && (!action || item.action === action);
  });

  renderResults(results);
}

function resetSearch() {
  ["players", "stack", "position", "action"].forEach(id => {
    document.getElementById(id).value = "";
  });
  searchImages();
}

function renderResults(items) {
  document.getElementById("count").textContent = `検索結果：${items.length}件`;

  const area = document.getElementById("results");
  if (items.length === 0) {
    area.innerHTML = '<div class="card">該当する画像がありません。</div>';
    return;
  }

  area.innerHTML = items.map(item => `
    <article class="result-item">
      <img src="${item.image}" alt="${item.title}">
      <div class="result-info">
        <h3>${item.title}</h3>
        <div class="tags">
          ${item.players} / ${item.stack} / ${item.position} / ${item.action}
        </div>
        ${item.memo ? `<div class="memo">${item.memo}</div>` : ""}
      </div>
    </article>
  `).join("");
}

setup();
</script>
</body>
</html>
