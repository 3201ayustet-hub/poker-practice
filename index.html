<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Practice GTO</title>
<script src="data.js"></script>
<style>
*{box-sizing:border-box}
:root{
  --bg:#020617;
  --panel:#0b1120;
  --panel2:#111827;
  --line:#283548;
  --text:#f9fafb;
  --muted:#9ca3af;
  --gold:#fbbf24;
  --orange:#f97316;
}
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(251,191,36,.16), transparent 28%),
    radial-gradient(circle at 80% 0%, rgba(249,115,22,.12), transparent 30%),
    linear-gradient(180deg,#0b1120 0%,#020617 48%,#000 100%);
  color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(2,6,23,.82);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.header-inner{
  max-width:1100px;
  margin:0 auto;
  padding:20px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
}
h1{
  margin:0;
  font-size:22px;
  letter-spacing:.12em;
}
.sub{
  color:var(--muted);
  font-size:13px;
  margin-top:4px;
}
a{
  color:var(--gold);
  text-decoration:none;
  font-weight:800;
}
main{
  max-width:1100px;
  margin:0 auto;
  padding:18px 16px 44px;
}
.panel{
  background:linear-gradient(180deg,rgba(17,24,39,.94),rgba(3,7,18,.95));
  border:1px solid var(--line);
  border-radius:20px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 18px 48px rgba(0,0,0,.36);
}
.filters{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
label{
  display:block;
  color:#d1d5db;
  font-size:12px;
  font-weight:900;
  letter-spacing:.08em;
  margin-bottom:7px;
}
select,button{
  width:100%;
  padding:14px 13px;
  border-radius:14px;
  font-size:16px;
}
select{
  color:var(--text);
  background:#020617;
  border:1px solid #475569;
}
button{
  margin-top:12px;
  border:0;
  color:#111827;
  background:linear-gradient(90deg,var(--gold),var(--orange));
  font-weight:950;
  letter-spacing:.06em;
  box-shadow:0 8px 20px rgba(249,115,22,.18);
}
button.secondary{
  background:#172033;
  color:#e5e7eb;
  border:1px solid #475569;
  box-shadow:none;
}
.status{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
}
.count{
  color:var(--gold);
  font-weight:950;
}
.result{
  display:grid;
  grid-template-columns:1fr;
}
.card{
  overflow:hidden;
  border-radius:20px;
  border:1px solid var(--line);
  background:#030712;
  box-shadow:0 18px 48px rgba(0,0,0,.48);
}
.card img{
  width:100%;
  display:block;
  background:#111827;
}
.info{
  padding:16px;
}
.info h2{
  margin:0 0 8px;
  font-size:18px;
}
.tags{
  color:var(--muted);
  font-size:13px;
}
.empty{
  text-align:center;
  color:var(--muted);
  padding:38px 14px;
}
.hint{
  color:var(--muted);
  font-size:13px;
  line-height:1.7;
}
@media(max-width:760px){
  .filters{grid-template-columns:1fr 1fr}
  .header-inner{display:block}
}
@media(max-width:430px){
  .filters{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>POKER PRACTICE GTO</h1>
      <div class="sub">1 condition set = 1 image</div>
    </div>
    <div><a href="admin.html">DEVELOPER</a></div>
  </div>
</header>

<main>
  <section class="panel">
    <div class="filters">
      <div><label>PLAYERS</label><select id="players"></select></div>
      <div><label>STACK</label><select id="stack"></select></div>
      <div><label>POSITION</label><select id="position"></select></div>
      <div><label>ACTION</label><select id="action"></select></div>
    </div>
    <button onclick="searchImage()">SEARCH</button>
    <button class="secondary" onclick="resetSearch()">RESET</button>
  </section>

  <section class="panel status">
    <div class="count" id="count"></div>
    <div class="hint">完全一致した画像を1枚表示します</div>
  </section>

  <section id="result" class="result"></section>
</main>

<script>
function setupSelect(id, values){
  const select=document.getElementById(id);
  select.innerHTML='<option value="">SELECT</option>';
  values.forEach(v=>{
    const op=document.createElement("option");
    op.value=v;
    op.textContent=v;
    select.appendChild(op);
  });
}
function setup(){
  setupSelect("players",OPTIONS.players);
  setupSelect("stack",OPTIONS.stack);
  setupSelect("position",OPTIONS.position);
  setupSelect("action",OPTIONS.action);
  searchImage();
}
function val(id){return document.getElementById(id).value}
function isComplete(){
  return val("players") && val("stack") && val("position") && val("action");
}
function makeTitle(item){
  return `${item.players} / ${item.stack} / ${item.position} / ${item.action}`;
}
function searchImage(){
  const area=document.getElementById("result");
  const count=document.getElementById("count");

  if(!isComplete()){
    count.textContent="SELECT CONDITIONS";
    area.innerHTML='<div class="panel empty">4つの条件をすべて選択してください。</div>';
    return;
  }

  const item=IMAGE_DATA.find(x=>
    x.players===val("players") &&
    x.stack===val("stack") &&
    x.position===val("position") &&
    x.action===val("action")
  );

  if(!item){
    count.textContent="NO IMAGE";
    area.innerHTML='<div class="panel empty">この条件の画像はまだ登録されていません。</div>';
    return;
  }

  count.textContent="FOUND";
  area.innerHTML=`
    <article class="card">
      <img src="${item.image}" alt="${makeTitle(item)}">
      <div class="info">
        <h2>${makeTitle(item)}</h2>
        <div class="tags">${item.players} / ${item.stack} / ${item.position} / ${item.action}</div>
      </div>
    </article>
  `;
}
function resetSearch(){
  ["players","stack","position","action"].forEach(id=>document.getElementById(id).value="");
  searchImage();
}
setup();
</script>
</body>
</html>
