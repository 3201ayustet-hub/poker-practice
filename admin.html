<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開発者ページ - Poker Practice</title>
  <script src="data.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f4f5;
      color: #111827;
    }
    header {
      background: #111827;
      color: white;
      padding: 18px;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin: 12px 0 6px;
    }
    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      background: white;
    }
    textarea {
      min-height: 90px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    button {
      cursor: pointer;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 700;
      margin-top: 12px;
    }
    .secondary {
      background: #6b7280;
    }
    .danger {
      background: #dc2626;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .item img {
      width: 100%;
      max-width: 360px;
      display: block;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      margin-top: 8px;
    }
    .note {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.7;
    }
    .nav a {
      color: #93c5fd;
    }
    code {
      background: #eef2ff;
      padding: 2px 5px;
      border-radius: 5px;
    }
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <h1>開発者ページ</h1>
  <div class="nav"><a href="index.html">検索画面へ戻る</a></div>
</header>

<main>
  <section class="card">
    <h2>画像データを追加</h2>
    <p class="note">
      画像はGitHubの <code>images</code> フォルダに入れます。<br>
      例：<code>images/btn-open-20bb.png</code><br>
      ここで作成した内容は、下の「data.js出力」をコピーしてGitHubの <code>data.js</code> に貼り替えて保存します。
    </p>

    <label>タイトル</label>
    <input id="title" placeholder="例：BTN Open / 6max / 20bb">

    <div class="grid">
      <div>
        <label>参加人数</label>
        <select id="players"></select>
      </div>
      <div>
        <label>スタック</label>
        <select id="stack"></select>
      </div>
      <div>
        <label>ポジション</label>
        <select id="position"></select>
      </div>
      <div>
        <label>アクション</label>
        <select id="action"></select>
      </div>
    </div>

    <label>画像ファイルパス</label>
    <input id="image" placeholder="例：images/btn-open-20bb.png">

    <label>メモ</label>
    <input id="memo" placeholder="任意">

    <button onclick="addItem()">追加</button>
  </section>

  <section class="card">
    <h2>プルダウン項目を追加</h2>
    <p class="note">後から参加人数・スタック・ポジション・アクションを増やせます。</p>

    <div class="grid">
      <div>
        <label>種類</label>
        <select id="optionType">
          <option value="players">参加人数</option>
          <option value="stack">スタック</option>
          <option value="position">ポジション</option>
          <option value="action">アクション</option>
        </select>
      </div>
      <div>
        <label>追加する値</label>
        <input id="optionValue" placeholder="例：75bb">
      </div>
    </div>

    <button onclick="addOption()">項目を追加</button>
  </section>

  <section class="card">
    <h2>登録済み画像</h2>
    <div id="list"></div>
  </section>

  <section class="card">
    <h2>data.js出力</h2>
    <p class="note">
      変更後は下の内容を全部コピーして、GitHubの <code>data.js</code> を編集し、丸ごと貼り替えてください。
    </p>
    <button onclick="copyOutput()">コピー</button>
    <textarea id="output" readonly></textarea>
  </section>
</main>

<script>
let workingOptions = JSON.parse(JSON.stringify(OPTIONS));
let workingData = JSON.parse(JSON.stringify(IMAGE_DATA));

function setupSelect(id, values) {
  const select = document.getElementById(id);
  select.innerHTML = "";
  values.forEach(value => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });
}

function refreshSelects() {
  setupSelect("players", workingOptions.players);
  setupSelect("stack", workingOptions.stack);
  setupSelect("position", workingOptions.position);
  setupSelect("action", workingOptions.action);
}

function addItem() {
  const item = {
    id: Date.now(),
    title: document.getElementById("title").value.trim(),
    players: document.getElementById("players").value,
    stack: document.getElementById("stack").value,
    position: document.getElementById("position").value,
    action: document.getElementById("action").value,
    image: document.getElementById("image").value.trim(),
    memo: document.getElementById("memo").value.trim()
  };

  if (!item.title || !item.image) {
    alert("タイトルと画像ファイルパスは必須です。");
    return;
  }

  workingData.push(item);

  document.getElementById("title").value = "";
  document.getElementById("image").value = "";
  document.getElementById("memo").value = "";

  render();
}

function addOption() {
  const type = document.getElementById("optionType").value;
  const value = document.getElementById("optionValue").value.trim();

  if (!value) {
    alert("追加する値を入力してください。");
    return;
  }

  if (!workingOptions[type].includes(value)) {
    workingOptions[type].push(value);
  }

  document.getElementById("optionValue").value = "";
  refreshSelects();
  render();
}

function deleteItem(id) {
  if (!confirm("この画像データを削除しますか？")) return;
  workingData = workingData.filter(item => item.id !== id);
  render();
}

function renderList() {
  const area = document.getElementById("list");

  if (workingData.length === 0) {
    area.innerHTML = "<p>登録データがありません。</p>";
    return;
  }

  area.innerHTML = workingData.map(item => `
    <div class="item">
      <strong>${item.title}</strong><br>
      ${item.players} / ${item.stack} / ${item.position} / ${item.action}<br>
      <small>${item.image}</small>
      <img src="${item.image}" alt="${item.title}">
      ${item.memo ? `<p>${item.memo}</p>` : ""}
      <button class="danger" onclick="deleteItem(${item.id})">削除</button>
    </div>
  `).join("");
}

function generateDataJs() {
  return `// data.js
// ここを編集すると、検索条件・画像リストを変更できます。
// 画像は images フォルダに入れて、image に "images/ファイル名" を書きます。

const OPTIONS = ${JSON.stringify(workingOptions, null, 2)};

const IMAGE_DATA = ${JSON.stringify(workingData, null, 2)};
`;
}

function renderOutput() {
  document.getElementById("output").value = generateDataJs();
}

function render() {
  renderList();
  renderOutput();
}

function copyOutput() {
  const textarea = document.getElementById("output");
  textarea.select();
  textarea.setSelectionRange(0, 999999);
  document.execCommand("copy");
  alert("コピーしました。GitHubの data.js に貼り替えてください。");
}

refreshSelects();
render();
</script>
</body>
</html>
