<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開発者画面 - Poker Practice</title>
  <script src="data.js"></script>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e5e7eb}.wrap{padding:16px;max-width:900px;margin:auto}header{padding:18px;background:#111827;border-bottom:1px solid #334155}h1{margin:0;font-size:22px}.panel{background:#111827;border:1px solid #334155;border-radius:16px;padding:14px;margin-bottom:16px}label{display:block;color:#94a3b8;font-size:13px;margin:10px 0 5px}input,textarea,select,button{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #475569;background:#020617;color:#e5e7eb;padding:12px;font-size:16px}button{background:#2563eb;border:none;font-weight:700;margin-top:12px}.sub{background:#475569}textarea{min-height:180px;font-family:monospace}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}a{color:#93c5fd}.small{color:#94a3b8;font-size:13px;line-height:1.7}
  </style>
</head>
<body>
<header><h1>開発者画面</h1><a href="index.html">検索画面へ戻る</a></header>
<div class="wrap">
  <div class="panel">
    <h2>画像データ追加</h2>
    <div class="small">入力後「data.jsを生成」を押し、下に出た内容をGitHubの data.js に丸ごと貼り替えてください。</div>
    <label>タイトル</label><input id="title" placeholder="例: 6max 20bb BTN Open">
    <div class="row"><div><label>参加人数</label><input id="players" placeholder="6max"></div><div><label>スタック</label><input id="stack" placeholder="20bb"></div></div>
    <div class="row"><div><label>ポジション</label><input id="position" placeholder="BTN"></div><div><label>アクション</label><input id="action" placeholder="Open"></div></div>
    <label>画像URL</label><input id="image" placeholder="https://...">
    <label>メモ</label><input id="memo" placeholder="任意">
    <button onclick="addImage()">画像データを追加</button>
  </div>

  <div class="panel">
    <h2>プルダウン項目編集</h2>
    <label>参加人数（カンマ区切り）</label><input id="optPlayers">
    <label>スタック（カンマ区切り）</label><input id="optStacks">
    <label>ポジション（カンマ区切り）</label><input id="optPositions">
    <label>アクション（カンマ区切り）</label><input id="optActions">
    <button class="sub" onclick="generateData()">data.jsを生成</button>
  </div>

  <div class="panel">
    <h2>生成された data.js</h2>
    <textarea id="output"></textarea>
    <button onclick="copyOutput()">コピー</button>
  </div>
</div>
<script>
let work=JSON.parse(JSON.stringify(APP_DATA));
function init(){
  document.getElementById('optPlayers').value=work.options.players.join(',');
  document.getElementById('optStacks').value=work.options.stacks.join(',');
  document.getElementById('optPositions').value=work.options.positions.join(',');
  document.getElementById('optActions').value=work.options.actions.join(',');
  generateData();
}
function csv(id){return document.getElementById(id).value.split(',').map(x=>x.trim()).filter(Boolean)}
function syncOptions(){work.options={players:csv('optPlayers'),stacks:csv('optStacks'),positions:csv('optPositions'),actions:csv('optActions')}}
function addImage(){
  syncOptions();
  work.images.push({
    id:Date.now(), title:val('title'), players:val('players'), stack:val('stack'), position:val('position'), action:val('action'), image:val('image'), memo:val('memo')
  });
  ['title','players','stack','position','action','image','memo'].forEach(id=>document.getElementById(id).value='');
  generateData(); alert('追加しました。生成された data.js をコピーしてGitHubで更新してください。');
}
function val(id){return document.getElementById(id).value.trim()}
function generateData(){syncOptions();document.getElementById('output').value='const APP_DATA = '+JSON.stringify(work,null,2)+';'}
function copyOutput(){document.getElementById('output').select();document.execCommand('copy');alert('コピーしました');}
init();
</script>
</body>
</html>
