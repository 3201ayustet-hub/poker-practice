<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTOver1 Developer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>DEVELOPER</h1>
      <div class="note">All users with this page can edit data.</div>
    </div>
    <div><a href="index.html">SEARCH</a></div>
  </div>
</header>

<main>
  <section class="panel">
    <h2>画像登録・差し替え</h2>
    <p class="note">
      1つの検索条件セットにつき画像は1枚です。同じ条件で保存すると画像を上書きします。<br>
      画像は自動で圧縮され、Firestoreに保存されます。
    </p>

    <div class="grid-4">
      <div><label>PLAYERS</label><select id="players"></select></div>
      <div><label>STACK</label><select id="stack"></select></div>
      <div><label>POSITION</label><select id="position"></select></div>
      <div><label>ACTION</label><select id="action"></select></div>
    </div>

    <div class="current-title" id="titlePreview"></div>

    <label>IMAGE</label>
    <input id="file" type="file" accept="image/*">
    <img id="preview" class="preview">

    <button id="saveBtn">SAVE / REPLACE IMAGE</button>
    <div id="saveMessage"></div>
  </section>

  <section class="panel">
    <h2>プルダウン項目編集</h2>
    <p class="note">
      項目は追加・削除できます。●が付いた項目は登録済み画像で使用されています。
    </p>

    <div class="grid-2">
      <div>
        <label>TYPE</label>
        <select id="optionType">
          <option value="players">参加人数</option>
          <option value="stack">スタック</option>
          <option value="position">ポジション</option>
          <option value="action">アクション</option>
        </select>
      </div>
      <div>
        <label>VALUE</label>
        <input id="optionValue" placeholder="例：75bb">
      </div>
    </div>

    <button id="addOptionBtn">ADD OPTION</button>
    <div id="optionList"></div>
  </section>

  <section class="panel">
    <h2>登録済み画像</h2>
    <div id="imageList"></div>
  </section>
</main>

<script type="module">
import {
  listenOptions,
  listenImages,
  saveOptions,
  saveImageItem,
  deleteImageItem,
  compressImage,
  setupSelect,
  makeTitle,
  makeKey,
  LABELS
} from "./app.js";

let options = null;
let images = [];
let selectedImage = "";

const ids = ["players", "stack", "position", "action"];

function value(id) {
  return document.getElementById(id).value;
}

function currentItem() {
  return {
    players: value("players"),
    stack: value("stack"),
    position: value("position"),
    action: value("action")
  };
}

function titleText() {
  return makeTitle(currentItem());
}

function updateTitle() {
  document.getElementById("titlePreview").textContent = titleText();
}

function renderSelects() {
  if (!options) return;

  setupSelect(document.getElementById("players"), options.players, "SELECT");
  setupSelect(document.getElementById("stack"), options.stack, "SELECT");
  setupSelect(document.getElementById("position"), options.position, "SELECT");
  setupSelect(document.getElementById("action"), options.action, "SELECT");

  ids.forEach(id => {
    if (!document.getElementById(id).value && options[id]?.length) {
      document.getElementById(id).value = options[id][0];
    }
  });

  updateTitle();
}

function message(text, type = "ok") {
  document.getElementById("saveMessage").innerHTML = `<div class="message ${type}">${text}</div>`;
}

function optionUsed(type, value) {
  return images.some(item => item[type] === value);
}

function renderOptions() {
  if (!options) return;
  const area = document.getElementById("optionList");

  area.innerHTML = Object.keys(LABELS).map(type => `
    <div class="option-box">
      <h3>${LABELS[type]}</h3>
      <div class="chip-row">
        ${options[type].map(value => `
          <span class="chip ${optionUsed(type, value) ? "used" : ""}">
            ${value}${optionUsed(type, value) ? " ●" : ""}
            <button data-type="${type}" data-value="${value}" class="delete-option">×</button>
          </span>
        `).join("")}
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".delete-option").forEach(btn => {
    btn.addEventListener("click", async () => {
      const type = btn.dataset.type;
      const value = btn.dataset.value;
      await deleteOption(type, value);
    });
  });
}

function renderImages() {
  const area = document.getElementById("imageList");

  if (images.length === 0) {
    area.innerHTML = '<p class="note">登録画像はまだありません。</p>';
    return;
  }

  area.innerHTML = images.map(item => `
    <div class="item">
      <div class="item-title">${makeTitle(item)}</div>
      <img src="${item.image}" alt="${makeTitle(item)}">
      <div class="actions">
        <button class="secondary use-item" data-key="${makeKey(item)}">この条件を選択</button>
        <button class="danger delete-item" data-key="${makeKey(item)}">削除</button>
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".use-item").forEach(btn => {
    btn.addEventListener("click", () => {
      const item = images.find(x => makeKey(x) === btn.dataset.key);
      if (!item) return;

      ids.forEach(id => {
        document.getElementById(id).value = item[id];
      });

      updateTitle();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });

  document.querySelectorAll(".delete-item").forEach(btn => {
    btn.addEventListener("click", async () => {
      const item = images.find(x => makeKey(x) === btn.dataset.key);
      if (!item) return;
      if (!confirm(`${makeTitle(item)} を削除しますか？`)) return;

      await deleteImageItem(item);
      message("画像を削除しました。");
    });
  });
}

async function addOption() {
  const type = document.getElementById("optionType").value;
  const value = document.getElementById("optionValue").value.trim();

  if (!value) {
    alert("追加する値を入力してください。");
    return;
  }

  if (options[type].includes(value)) {
    alert("すでに存在します。");
    return;
  }

  const next = {
    ...options,
    [type]: [...options[type], value]
  };

  await saveOptions(next);
  document.getElementById("optionValue").value = "";
  message("プルダウン項目を追加しました。");
}

async function deleteOption(type, value) {
  if (options[type].length <= 1) {
    alert("各リストには最低1つの項目が必要です。");
    return;
  }

  if (optionUsed(type, value)) {
    if (!confirm(`「${value}」を使っている画像があります。削除しますか？`)) return;
  } else {
    if (!confirm(`「${value}」を削除しますか？`)) return;
  }

  const next = {
    ...options,
    [type]: options[type].filter(x => x !== value)
  };

  await saveOptions(next);
  message("プルダウン項目を削除しました。");
}

async function saveImage() {
  if (!selectedImage) {
    message("画像を選択してください。", "warn");
    return;
  }

  const item = currentItem();

  if (!item.players || !item.stack || !item.position || !item.action) {
    message("4つの条件をすべて選択してください。", "warn");
    return;
  }

  const exists = images.some(x => makeKey(x) === makeKey(item));
  if (exists && !confirm("同じ条件の画像があります。上書きしますか？")) {
    return;
  }

  await saveImageItem({
    ...item,
    image: selectedImage
  });

  selectedImage = "";
  document.getElementById("file").value = "";
  document.getElementById("preview").style.display = "none";

  message(exists ? "画像を上書きしました。" : "画像を保存しました。");
}

document.getElementById("file").addEventListener("change", async event => {
  const file = event.target.files[0];
  if (!file) return;

  message("画像を圧縮しています...");
  selectedImage = await compressImage(file, 1200, 0.70);

  const preview = document.getElementById("preview");
  preview.src = selectedImage;
  preview.style.display = "block";

  message("画像を選択しました。SAVEボタンで保存してください。");
});

ids.forEach(id => {
  document.getElementById(id).addEventListener("change", updateTitle);
});

document.getElementById("saveBtn").addEventListener("click", saveImage);
document.getElementById("addOptionBtn").addEventListener("click", addOption);

listenOptions(newOptions => {
  options = newOptions;
  renderSelects();
  renderOptions();
});

listenImages(newImages => {
  images = newImages;
  renderOptions();
  renderImages();
});
</script>
</body>
</html>
