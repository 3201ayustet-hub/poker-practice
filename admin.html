<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer - Poker Practice GTO</title>
<script src="data.js"></script>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:radial-gradient(circle at top,#1f2937 0,#030712 45%,#000 100%);
  color:#f9fafb;
  min-height:100vh;
}
header{
  padding:24px 18px;
  border-bottom:1px solid #1f2937;
  background:rgba(0,0,0,.6);
}
.header-inner{max-width:1050px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
h1{margin:0;font-size:23px;letter-spacing:.08em}
h2{margin-top:0}
a{color:#fbbf24;text-decoration:none}
main{max-width:1050px;margin:0 auto;padding:18px}
.panel{
  background:linear-gradient(180deg,rgba(17,24,39,.96),rgba(3,7,18,.96));
  border:1px solid #374151;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 16px 40px rgba(0,0,0,.35);
}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
label{
  display:block;
  color:#d1d5db;
  font-size:12px;
  font-weight:900;
  margin:12px 0 6px;
  letter-spacing:.06em;
}
select,input,textarea,button{
  width:100%;
  padding:13px;
  border-radius:12px;
  font-size:16px;
}
select,input,textarea{
  background:#020617;
  color:#f9fafb;
  border:1px solid #4b5563;
}
input[type=file]{background:#111827}
button{
  border:0;
  color:#111827;
  background:linear-gradient(90deg,#fbbf24,#f97316);
  font-weight:900;
  margin-top:12px;
}
button.secondary{background:#1f2937;color:#e5e7eb;border:1px solid #4b5563}
button.danger{background:#991b1b;color:#fff}
textarea{
  min-height:260px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:12px;
}
.note{color:#9ca3af;line-height:1.7;font-size:14px}
.preview{
  max-width:100%;
  border-radius:14px;
  border:1px solid #374151;
  margin-top:12px;
  display:none;
}
.item{
  border:1px solid #374151;
  background:#020617;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}
.item img{width:100%;max-width:360px;border-radius:12px;margin-top:8px}
.badge{color:#fbbf24;font-weight:800;font-size:13px}
@media(max-width:720px){.grid{grid-template-columns:1fr}.header-inner{display:block}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1>DEVELOPER</h1>
    <a href="index.html">Search</a>
  </div>
</header>

<main>
  <section class="panel">
    <h2>画像登録</h2>
    <p class="note">
      タイトルは自動生成されます。例：<b>6max / 20bb / BTN / Open</b><br>
      画像はiPhoneの写真・ファイルから選択できます。登録時に自動圧縮してdata.jsに埋め込みます。
    </p>

    <div class="grid">
      <div><label>PLAYERS</label><select id="players"></select></div>
      <div><label>STACK</label><select id="stack"></select></div>
      <div><label>POSITION</label><select id="position"></select></div>
      <div><label>ACTION</label><select id="action"></select></div>
    </div>

    <label>IMAGE</label>
    <input id="file" type="file" accept="image/*">
    <img id="preview" class="preview">

    <button onclick="addItem()">ADD IMAGE</button>
  </section>

  <section class="panel">
    <h2>プルダウン項目追加</h2>
    <div class="grid">
      <div>
        <label>TYPE</label>
        <select id="optionType">
          <option value="players">参加人数</option>
          <option value="stack">スタック</option>
          <option value="position">ポジション</option>
          <option value="action">アクション</option>
        </select>
      </div>
      <div>
        <label>VALUE</label>
        <input id="optionValue" placeholder="例：75bb">
      </div>
    </div>
    <button onclick="addOption()">ADD OPTION</button>
  </section>

  <section class="panel">
    <h2>登録済み画像</h2>
    <div id="list"></div>
  </section>

  <section class="panel">
    <h2>data.js出力</h2>
    <p class="note">
      変更後は下の内容をコピーして、GitHubの <b>data.js</b> を丸ごと貼り替えてください。
    </p>
    <button onclick="copyOutput()">COPY data.js</button>
    <textarea id="output" readonly></textarea>
  </section>
</main>

<script>
let workingOptions=JSON.parse(JSON.stringify(OPTIONS));
let workingData=JSON.parse(JSON.stringify(IMAGE_DATA));
let selectedImage="";

function setupSelect(id, values){
  const select=document.getElementById(id);
  select.innerHTML="";
  values.forEach(v=>{
    const op=document.createElement("option");
    op.value=v;
    op.textContent=v;
    select.appendChild(op);
  });
}

function refreshSelects(){
  setupSelect("players",workingOptions.players);
  setupSelect("stack",workingOptions.stack);
  setupSelect("position",workingOptions.position);
  setupSelect("action",workingOptions.action);
}

document.getElementById("file").addEventListener("change", async e=>{
  const file=e.target.files[0];
  if(!file)return;
  selectedImage=await compressImage(file,1200,0.78);
  const preview=document.getElementById("preview");
  preview.src=selectedImage;
  preview.style.display="block";
});

function compressImage(file,maxWidth,quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,maxWidth/img.width);
        const canvas=document.createElement("canvas");
        canvas.width=Math.round(img.width*scale);
        canvas.height=Math.round(img.height*scale);
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function currentTitle(){
  return [
    document.getElementById("players").value,
    document.getElementById("stack").value,
    document.getElementById("position").value,
    document.getElementById("action").value
  ].join(" / ");
}

function addItem(){
  if(!selectedImage){
    alert("画像を選択してください。");
    return;
  }
  const item={
    id:Date.now(),
    title:currentTitle(),
    players:document.getElementById("players").value,
    stack:document.getElementById("stack").value,
    position:document.getElementById("position").value,
    action:document.getElementById("action").value,
    image:selectedImage
  };
  workingData.push(item);
  selectedImage="";
  document.getElementById("file").value="";
  document.getElementById("preview").style.display="none";
  render();
}

function addOption(){
  const type=document.getElementById("optionType").value;
  const value=document.getElementById("optionValue").value.trim();
  if(!value){
    alert("追加する値を入力してください。");
    return;
  }
  if(!workingOptions[type].includes(value)){
    workingOptions[type].push(value);
  }
  document.getElementById("optionValue").value="";
  refreshSelects();
  render();
}

function deleteItem(id){
  if(!confirm("削除しますか？"))return;
  workingData=workingData.filter(x=>x.id!==id);
  render();
}

function renderList(){
  const area=document.getElementById("list");
  if(workingData.length===0){
    area.innerHTML='<p class="note">登録画像はまだありません。</p>';
    return;
  }
  area.innerHTML=workingData.map(item=>`
    <div class="item">
      <div class="badge">${item.title}</div>
      <img src="${item.image}">
      <button class="danger" onclick="deleteItem(${item.id})">DELETE</button>
    </div>
  `).join("");
}

function generateDataJs(){
  return `// data.js
// GitHub上でこのファイルを更新すると、検索条件・画像データが変わります。

const OPTIONS = ${JSON.stringify(workingOptions,null,2)};

const IMAGE_DATA = ${JSON.stringify(workingData,null,2)};
`;
}

function renderOutput(){
  document.getElementById("output").value=generateDataJs();
}

function render(){
  renderList();
  renderOutput();
}

function copyOutput(){
  const t=document.getElementById("output");
  t.select();
  t.setSelectionRange(0,9999999);
  document.execCommand("copy");
  alert("コピーしました。GitHubのdata.jsに貼り替えてください。");
}

refreshSelects();
render();
</script>
</body>
</html>
