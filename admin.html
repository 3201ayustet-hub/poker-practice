<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer - Poker Practice GTO</title>
<script src="data.js"></script>
<style>
*{box-sizing:border-box}
:root{
  --bg:#020617;
  --panel:#0b1120;
  --line:#283548;
  --text:#f9fafb;
  --muted:#9ca3af;
  --gold:#fbbf24;
  --orange:#f97316;
  --red:#ef4444;
  --green:#22c55e;
}
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(251,191,36,.16), transparent 28%),
    radial-gradient(circle at 80% 0%, rgba(249,115,22,.12), transparent 30%),
    linear-gradient(180deg,#0b1120 0%,#020617 48%,#000 100%);
  color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(2,6,23,.86);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.header-inner{
  max-width:1120px;
  margin:0 auto;
  padding:20px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
h1{margin:0;font-size:22px;letter-spacing:.12em}
h2{margin:0 0 12px;font-size:20px}
h3{margin:18px 0 10px;font-size:15px;color:#e5e7eb}
a{color:var(--gold);text-decoration:none;font-weight:900}
main{
  max-width:1120px;
  margin:0 auto;
  padding:18px 16px 44px;
}
.panel{
  background:linear-gradient(180deg,rgba(17,24,39,.94),rgba(3,7,18,.95));
  border:1px solid var(--line);
  border-radius:20px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 18px 48px rgba(0,0,0,.36);
}
.note{
  color:var(--muted);
  line-height:1.7;
  font-size:14px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
label{
  display:block;
  color:#d1d5db;
  font-size:12px;
  font-weight:900;
  letter-spacing:.08em;
  margin:12px 0 7px;
}
select,input,textarea,button{
  width:100%;
  padding:14px 13px;
  border-radius:14px;
  font-size:16px;
}
select,input,textarea{
  color:var(--text);
  background:#020617;
  border:1px solid #475569;
}
input[type=file]{
  background:#111827;
}
button{
  margin-top:12px;
  border:0;
  color:#111827;
  background:linear-gradient(90deg,var(--gold),var(--orange));
  font-weight:950;
  letter-spacing:.06em;
}
button.secondary{
  background:#172033;
  color:#e5e7eb;
  border:1px solid #475569;
}
button.danger{
  background:#991b1b;
  color:white;
}
button.small{
  width:auto;
  padding:8px 11px;
  margin:0;
  font-size:13px;
  border-radius:999px;
}
.preview{
  width:100%;
  max-width:480px;
  display:none;
  margin-top:12px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#111827;
}
.current-title{
  color:var(--gold);
  font-weight:950;
  font-size:18px;
  margin-top:14px;
  padding:12px;
  border:1px solid rgba(251,191,36,.35);
  background:rgba(251,191,36,.08);
  border-radius:14px;
}
.chip-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chip{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:8px 10px;
  border-radius:999px;
  background:#020617;
  border:1px solid #475569;
  color:#e5e7eb;
  font-size:14px;
}
.chip button{
  width:auto;
  margin:0;
  padding:2px 7px;
  border-radius:999px;
  background:#7f1d1d;
  color:#fff;
  font-size:12px;
}
.option-box{
  border:1px solid #374151;
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
  background:rgba(2,6,23,.55);
}
.item{
  border:1px solid #374151;
  background:#020617;
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
}
.item-title{
  color:var(--gold);
  font-weight:950;
  margin-bottom:8px;
}
.item img{
  width:100%;
  max-width:380px;
  display:block;
  border-radius:14px;
  border:1px solid #374151;
  margin:8px 0 12px;
}
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
textarea{
  min-height:280px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:12px;
}
.warning{
  color:#fecaca;
  background:rgba(127,29,29,.35);
  border:1px solid rgba(239,68,68,.4);
  padding:10px;
  border-radius:12px;
  font-size:14px;
  line-height:1.6;
}
.success{
  color:#bbf7d0;
  background:rgba(20,83,45,.35);
  border:1px solid rgba(34,197,94,.35);
  padding:10px;
  border-radius:12px;
  font-size:14px;
  line-height:1.6;
}
@media(max-width:760px){
  .grid{grid-template-columns:1fr}
  .header-inner{display:block}
  .actions{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1>DEVELOPER</h1>
    <a href="index.html">SEARCH</a>
  </div>
</header>

<main>
  <section class="panel">
    <h2>画像登録・差し替え</h2>
    <p class="note">
      1つの検索条件セットにつき画像は1枚だけです。<br>
      同じ条件で登録すると、既存画像を上書きします。
    </p>

    <div class="grid">
      <div><label>PLAYERS</label><select id="players"></select></div>
      <div><label>STACK</label><select id="stack"></select></div>
      <div><label>POSITION</label><select id="position"></select></div>
      <div><label>ACTION</label><select id="action"></select></div>
    </div>

    <div class="current-title" id="titlePreview"></div>

    <label>IMAGE</label>
    <input id="file" type="file" accept="image/*">
    <img id="preview" class="preview">

    <button onclick="saveImage()">SAVE / REPLACE IMAGE</button>
    <div id="saveMessage"></div>
  </section>

  <section class="panel">
    <h2>プルダウン項目編集</h2>
    <p class="note">
      項目は追加・削除できます。登録画像で使用中の項目を削除する場合は警告します。
    </p>

    <div class="grid">
      <div>
        <label>追加する種類</label>
        <select id="optionType">
          <option value="players">参加人数</option>
          <option value="stack">スタック</option>
          <option value="position">ポジション</option>
          <option value="action">アクション</option>
        </select>
      </div>
      <div>
        <label>追加する値</label>
        <input id="optionValue" placeholder="例：75bb">
      </div>
    </div>
    <button onclick="addOption()">ADD OPTION</button>

    <div id="optionList"></div>
  </section>

  <section class="panel">
    <h2>登録済み画像</h2>
    <div id="imageList"></div>
  </section>

  <section class="panel">
    <h2>data.js出力</h2>
    <p class="note">
      変更が終わったら、下のボタンでコピーして、GitHub上の <b>data.js</b> を丸ごと貼り替えてください。
    </p>
    <button onclick="copyOutput()">COPY data.js</button>
    <textarea id="output" readonly></textarea>
  </section>
</main>

<script>
let workingOptions=JSON.parse(JSON.stringify(OPTIONS));
let workingData=JSON.parse(JSON.stringify(IMAGE_DATA));
let selectedImage="";

const labels={
  players:"参加人数",
  stack:"スタック",
  position:"ポジション",
  action:"アクション"
};

function setupSelect(id, values){
  const select=document.getElementById(id);
  const current=select.value;
  select.innerHTML="";
  values.forEach(v=>{
    const op=document.createElement("option");
    op.value=v;
    op.textContent=v;
    select.appendChild(op);
  });
  if(values.includes(current)) select.value=current;
}
function refreshSelects(){
  setupSelect("players",workingOptions.players);
  setupSelect("stack",workingOptions.stack);
  setupSelect("position",workingOptions.position);
  setupSelect("action",workingOptions.action);
  updateTitlePreview();
}
["players","stack","position","action"].forEach(id=>{
  document.addEventListener("change",e=>{
    if(e.target && e.target.id===id) updateTitlePreview();
  });
});
function val(id){return document.getElementById(id).value}
function currentKey(){
  return {
    players:val("players"),
    stack:val("stack"),
    position:val("position"),
    action:val("action")
  };
}
function currentTitle(){
  const k=currentKey();
  return `${k.players} / ${k.stack} / ${k.position} / ${k.action}`;
}
function updateTitlePreview(){
  document.getElementById("titlePreview").textContent=currentTitle();
}

document.getElementById("file").addEventListener("change",async e=>{
  const file=e.target.files[0];
  if(!file)return;
  selectedImage=await compressImage(file,1200,0.78);
  const preview=document.getElementById("preview");
  preview.src=selectedImage;
  preview.style.display="block";
});

function compressImage(file,maxWidth,quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,maxWidth/img.width);
        const canvas=document.createElement("canvas");
        canvas.width=Math.round(img.width*scale);
        canvas.height=Math.round(img.height*scale);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function findIndexByCurrentKey(){
  const k=currentKey();
  return workingData.findIndex(x=>
    x.players===k.players &&
    x.stack===k.stack &&
    x.position===k.position &&
    x.action===k.action
  );
}

function saveImage(){
  const msg=document.getElementById("saveMessage");
  if(!selectedImage){
    msg.innerHTML='<div class="warning">画像を選択してください。</div>';
    return;
  }

  const idx=findIndexByCurrentKey();
  const item={
    id: idx>=0 ? workingData[idx].id : Date.now(),
    title:currentTitle(),
    ...currentKey(),
    image:selectedImage
  };

  if(idx>=0){
    if(!confirm("同じ条件の画像があります。上書きしますか？")) return;
    workingData[idx]=item;
    msg.innerHTML='<div class="success">既存画像を上書きしました。</div>';
  }else{
    workingData.push(item);
    msg.innerHTML='<div class="success">画像を登録しました。</div>';
  }

  selectedImage="";
  document.getElementById("file").value="";
  document.getElementById("preview").style.display="none";
  render();
}

function addOption(){
  const type=document.getElementById("optionType").value;
  const value=document.getElementById("optionValue").value.trim();
  if(!value){
    alert("追加する値を入力してください。");
    return;
  }
  if(workingOptions[type].includes(value)){
    alert("すでに存在します。");
    return;
  }
  workingOptions[type].push(value);
  document.getElementById("optionValue").value="";
  refreshSelects();
  render();
}

function optionUsed(type,value){
  return workingData.some(item=>item[type]===value);
}

function deleteOption(type,value){
  const used=optionUsed(type,value);
  if(used){
    const ok=confirm(`「${value}」を使っている画像があります。削除すると、その画像が検索しにくくなります。削除しますか？`);
    if(!ok)return;
  }else{
    if(!confirm(`「${value}」を削除しますか？`))return;
  }

  if(workingOptions[type].length<=1){
    alert("各リストには最低1つの項目が必要です。");
    return;
  }

  workingOptions[type]=workingOptions[type].filter(v=>v!==value);
  refreshSelects();
  render();
}

function renderOptions(){
  const area=document.getElementById("optionList");
  area.innerHTML=Object.keys(workingOptions).map(type=>`
    <div class="option-box">
      <h3>${labels[type]}</h3>
      <div class="chip-row">
        ${workingOptions[type].map(value=>`
          <span class="chip">
            ${value}${optionUsed(type,value) ? " ●" : ""}
            <button onclick="deleteOption('${type}','${value}')">×</button>
          </span>
        `).join("")}
      </div>
    </div>
  `).join("");
}

function deleteImage(id){
  if(!confirm("この画像を削除しますか？"))return;
  workingData=workingData.filter(x=>x.id!==id);
  render();
}

function useForEdit(id){
  const item=workingData.find(x=>x.id===id);
  if(!item)return;
  document.getElementById("players").value=item.players;
  document.getElementById("stack").value=item.stack;
  document.getElementById("position").value=item.position;
  document.getElementById("action").value=item.action;
  updateTitlePreview();
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderImages(){
  const area=document.getElementById("imageList");
  if(workingData.length===0){
    area.innerHTML='<p class="note">登録画像はまだありません。</p>';
    return;
  }
  area.innerHTML=workingData.map(item=>`
    <div class="item">
      <div class="item-title">${item.players} / ${item.stack} / ${item.position} / ${item.action}</div>
      <img src="${item.image}">
      <div class="actions">
        <button class="secondary" onclick="useForEdit(${item.id})">この条件を選択</button>
        <button class="danger" onclick="deleteImage(${item.id})">削除</button>
      </div>
    </div>
  `).join("");
}

function generateDataJs(){
  return `// data.js
// このファイルをGitHub上で更新すると、検索条件・画像データが変わります。
// 開発者ページで作成されたdata.js出力を、丸ごと貼り替えて使います。

const OPTIONS = ${JSON.stringify(workingOptions,null,2)};

const IMAGE_DATA = ${JSON.stringify(workingData,null,2)};
`;
}

function renderOutput(){
  document.getElementById("output").value=generateDataJs();
}
function render(){
  renderOptions();
  renderImages();
  renderOutput();
}
function copyOutput(){
  const t=document.getElementById("output");
  t.select();
  t.setSelectionRange(0,9999999);
  document.execCommand("copy");
  alert("コピーしました。GitHubのdata.jsに貼り替えてください。");
}

refreshSelects();
render();
</script>
</body>
</html>
